<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="800"
    height="200"
    viewBox="0 0 800 200"
    role="img"
    aria-labelledby="title desc">
    <title id="title">Test Banner</title>
    <desc id="desc">Simple test SVG to verify GitHub rendering.</desc>

    <rect x="0" y="0" width="800" height="200" fill="#020617" />
    <text
        x="50%"
        y="50%"
        text-anchor="middle"
        font-family="JetBrains Mono, monospace"
        font-size="24"
        fill="#22c55e">
        SVG TEST OK
    </text>
</svg>
