<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="285" viewBox="0 0 1200 285"
     xmlns="http://www.w3.org/2000/svg"
     role="img"
     aria-labelledby="title desc">

  <title id="title">Java Reboot Training Banner</title>
  <desc id="desc">Animated ASCII banner with turbulence and displacement.</desc>

  <defs>
    <!-- Base glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Blur fade-in on load -->
    <filter id="blurFade">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12">
        <animate attributeName="stdDeviation"
                 values="12;7;3;0"
                 dur="2.5s"
                 begin="0.2s"
                 fill="freeze"/>
      </feGaussianBlur>
    </filter>

    <!-- Reverse entropy: pull fragments inward then hold -->
    <filter id="reform" x="-20%" y="-40%" width="140%" height="180%">
      <feTurbulence type="turbulence"
                    baseFrequency="0.02 0.1"
                    numOctaves="4"
                    seed="88"
                    result="noise">
        <animate attributeName="baseFrequency"
                 values="0.02 0.1; 0.015 0.08; 0.02 0.1"
                 dur="4s"
                 repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic"
                         in2="noise"
                         scale="60"
                         xChannelSelector="G"
                         yChannelSelector="R">
        <animate attributeName="scale"
                 values="60; 0; 0; 60"
                 keyTimes="0; 0.4; 0.7; 1"
                 dur="10s"
                 repeatCount="indefinite"/>
      </feDisplacementMap>
    </filter>

    <!-- Reconstruction shimmer -->
    <filter id="rebuild" x="-10%" y="-20%" width="120%" height="140%">
      <feTurbulence type="fractalNoise"
                    baseFrequency="0.03 0.2"
                    numOctaves="2"
                    seed="12"
                    result="noise">
        <animate attributeName="baseFrequency"
                 values="0.03 0.2; 0.02 0.1; 0.03 0.2"
                 dur="3s"
                 repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic"
                         in2="noise"
                         scale="6"/>
    </filter>
  </defs>

  <rect width="1200" height="285" fill="#020617"/>

  <g filter="url(#glow)">
    <g filter="url(#blurFade)">
      <g filter="url(#reform)">
        <g filter="url(#rebuild)">
          <!-- Upward drift applied directly as child, not via <use> -->
          <g>
            <animateTransform attributeName="transform"
                              type="translate"
                              values="0,8; 0,4; 0,0"
                              dur="3s"
                              repeatCount="indefinite"/>

            <foreignObject x="0" y="30" width="1200" height="228">
              <pre xmlns="http://www.w3.org/1999/xhtml"
                   style="
                     color: #22c55e;
                     font-family: 'JetBrains Mono','Fira Code',Consolas,monospace;
                     font-size: 14px;
                     line-height: 25px;
                     white-space: pre;
                     margin: 0 auto;
                     display: block;
                     width: max-content;
                   "> (                                                   (
 )\ )                     )                          )\ )      (        )
(()/(      (           ( /( (     (   (     (       (()/(      )\ )  ( /( (  (       )  (      (
 /(_)) (   )(   `  )   )\()))\ )  )(  )\   ))\  (    /(_)) (  (()/(  )\()))\))(   ( /(  )(    ))\
(_))   )\ (()\  /(/(  ((_)\(()/( (()\((_) /((_) )\  (_))   )\  /(_))(_))/((_)()\  )(_))(()\  /((_)
| _ \ ((_) ((_)((_)_\ | |(_))(_)) ((_)(_)(_))( ((_) / __| ((_)(_) _|| |_ _(()((_)((_)_  ((_)(_))
|  _// _ \| '_|| '_ \)| ' \| || || '_|| || || |(_-&lt; \__ \/ _ \ |  _||  _|\ V  V // _` || '_|/ -_)
|_|  \___/|_|  | .__/ |_||_|\_, ||_|  |_| \_,_|/__/ |___/\___/ |_|   \__| \_/\_/ \__,_||_|  \___|
               |_|          |__/                                                                   </pre>
            </foreignObject>
          </g>
        </g>
      </g>
    </g>
  </g>

</svg>
