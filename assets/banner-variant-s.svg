<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1200"
    height="260"
    viewBox="0 0 1200 260"
    role="img"
    aria-labelledby="title desc">

    <title id="title">Java Reboot Training Banner - Variant S-loop</title>
    <desc id="desc">
        Animated ASCII banner with turbulence and displacement, forward-pause-reverse loop.
    </desc>

    <!-- Background -->
    <defs>
        <!-- Turbulence + displacement filter that will warp EVERYTHING (including ASCII) -->
        <filter id="warp" x="-20%" y="-50%" width="140%" height="200%">
            <feTurbulence
                type="fractalNoise"
                baseFrequency="0.012 0.18"
                numOctaves="3"
                seed="7"
                stitchTiles="noStitch"
                result="noise">
                <!-- S-loop animation: forward → pause → reverse → pause → repeat -->
                <animate
                    attributeName="baseFrequency"
                    dur="10s"
                    repeatCount="indefinite"
                    values="0.012 0.18; 0.028 0.32; 0.012 0.18; 0.028 0.32; 0.012 0.18"
                    keyTimes="0; 0.35; 0.5; 0.85; 1"
                    calcMode="spline"
                    keySplines="
            0.42 0 0.58 1;
            0.42 0 0.58 1;
            0.42 0 0.58 1;
            0.42 0 0.58 1" />
            </feTurbulence>

            <feDisplacementMap
                in="SourceGraphic"
                in2="noise"
                scale="22"
                xChannelSelector="R"
                yChannelSelector="G" />
        </filter>

        <!-- Subtle glow for the ASCII -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feColorMatrix
                in="blur"
                type="matrix"
                values="
            0 0 0 0 0.2
            0 1 0 0 0.9
            0 0 0 0 0.3
            0 0 0 0.8 0" />
        </filter>

        <!-- Gradient background -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#020617"/>
            <stop offset="40%" stop-color="#020617"/>
            <stop offset="60%" stop-color="#022c22"/>
            <stop offset="100%" stop-color="#020617"/>
        </linearGradient>
    </defs>

    <!-- Background rect (also warped) -->
    <g filter="url(#warp)">
        <rect
            x="0"
            y="0"
            width="1200"
            height="260"
            fill="url(#bgGrad)" />
    </g>

    <!-- ASCII + glow, both going through the warp filter -->
    <g filter="url(#warp)">
        <!-- Glow behind text -->
        <g filter="url(#glow)">
            <text
                x="50%"
                y="95"
                text-anchor="middle"
                font-family="JetBrains Mono, monospace"
                font-size="18"
                fill="#22c55e">
                (                                                   (
            </text>
            <text
                x="50%"
                y="120"
                text-anchor="middle"
                font-family="JetBrains Mono, monospace"
                font-size="18"
                fill="#22c55e">
                )\ )                     )                          )\ )      (        )
            </text>
            <text
                x="50%"
                y="145"
                text-anchor="middle"
                font-family="JetBrains Mono, monospace"
                font-size="18"
                fill="#22c55e">
                (()/(      (           ( /( (     (   (     (       (()/(      )\ )  ( /( (  (       )  (      (
            </text>
            <text
                x="50%"
                y="170"
                text-anchor="middle"
                font-family="JetBrains Mono, monospace"
                font-size="18"
                fill="#22c55e">
                /(_)) (   )(   `  )   )\()))\ )  )(  )\   ))\  (    /(_)) (  (()/(  )\()))\))(   ( /(  )(    ))\
            </text>
            <text
                x="50%"
                y="195"
                text-anchor="middle"
                font-family="JetBrains Mono, monospace"
                font-size="18"
                fill="#22c55e">
                (_))   )\ (()\  /(/(  ((_)\(()/( (()\((_) /((_) )\  (_))   )\  /(_))(_))/((_)()\  )(_))(()\  /((_)
            </text>
            <text
                x="50%"
                y="220"
                text-anchor="middle"
                font-family="JetBrains Mono, monospace"
                font-size="18"
                fill="#22c55e">
                | _ \ ((_) ((_)((_)_\ | |(_))(_)) ((_)(_)(_))( ((_) / __| ((_)(_) _|| |_ _(()((_)((_)_  ((_)(_))
            </text>
            <text
                x="50%"
                y="245"
                text-anchor="middle"
                font-family="JetBrains Mono, monospace"
                font-size="18"
                fill="#22c55e">
                |  _// _ \| '_|| '_ \)| ' \| || || '_|| || || |(_-< \__ \/ _ \ |  _||  _|\ V  V // _` || '_|/ -_)
            </text>
            <text
                x="50%"
                y="270"
                text-anchor="middle"
                font-family="JetBrains Mono, monospace"
                font-size="18"
                fill="#22c55e">
                |_|  \___/|_|  | .__/ |_||_|\_, ||_|  |_| \_,_|/__/ |___/\___/ |_|   \__| \_/\_/ \__,_||_|  \___|
            </text>
        </g>
    </g>

</svg>
