<svg width="1400" height="420" viewBox="0 0 1400 420"
     xmlns="http://www.w3.org/2000/svg">

    <defs>
        <!-- Base glow -->
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <!-- Blur fade-in -->
        <filter id="blurFade">
            <feGaussianBlur in="SourceGraphic" stdDeviation="12">
                <animate attributeName="stdDeviation"
                         values="12;7;3;0"
                         dur="2.5s"
                         begin="0.2s"
                         fill="freeze"/>
            </feGaussianBlur>
        </filter>

        <!-- Reverse entropy (pull fragments inward) -->
        <filter id="reform">
            <feTurbulence type="turbulence"
                          baseFrequency="0.02 0.1"
                          numOctaves="4"
                          seed="88"
                          result="noise">
                <animate attributeName="baseFrequency"
                         values="0.02 0.1; 0.015 0.08; 0.02 0.1"
                         dur="4s"
                         repeatCount="indefinite"/>
            </feTurbulence>

            <!-- Inward displacement with LOOP LOGIC -->
            <feDisplacementMap in="SourceGraphic"
                               in2="noise"
                               scale="40"
                               xChannelSelector="G"
                               yChannelSelector="R">
                <animate attributeName="scale"
                         values="60; 0; 0; 60"
                         keyTimes="0; 0.4; 0.7; 1"
                         dur="10s"
                         repeatCount="indefinite"
                         fill="freeze"/>
            </feDisplacementMap>
        </filter>

        <!-- Reconstruction shimmer -->
        <filter id="rebuild">
            <feTurbulence type="fractalNoise"
                          baseFrequency="0.03 0.2"
                          numOctaves="2"
                          seed="12"
                          result="noise">
                <animate attributeName="baseFrequency"
                         values="0.03 0.2; 0.02 0.1; 0.03 0.2"
                         dur="3s"
                         repeatCount="indefinite"/>
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic"
                               in2="noise"
                               scale="6"/>
        </filter>

        <!-- Upward drift (reverse of collapse) -->
        <animateTransform id="rise"
                          attributeName="transform"
                          type="translate"
                          values="0,8; 0,4; 0,0"
                          dur="3s"
                          repeatCount="indefinite"/>
    </defs>

    <rect width="100%" height="100%" fill="#020617"/>

    <!-- Reassembly Protocol group -->
    <g filter="url(#glow)">
        <g filter="url(#blurFade)">
            <g filter="url(#reform)">
                <g filter="url(#rebuild)">
                    <g transform="translate(0,0)">
                        <use href="#rise"/>

                        <foreignObject x="40" y="60" width="1320" height="320">
                            <pre xmlns="http://www.w3.org/1999/xhtml"
                                 style="
                     color:#22c55e;
                     font-family:'JetBrains Mono','Fira Code',Consolas,monospace;
                     font-size:14px;
                     line-height:14px;
                     white-space:pre;
                   ">
                                (                                                   (
                                )\ )                     )                          )\ )      (        )
                                (()/(      (           ( /( (     (   (     (       (()/(      )\ )  ( /( (  (       )  (      (
                                /(_)) (   )(   `  )   )\()))\ )  )(  )\   ))\  (    /(_)) (  (()/(  )\()))\))(   ( /(  )(    ))\
                                (_))   )\ (()\  /(/(  ((_)\(()/( (()\((_) /((_) )\  (_))   )\  /(_))(_))/((_)()\  )(_))(()\  /((_)
                                | _ \ ((_) ((_)((_)_\ | |(_))(_)) ((_)(_)(_))( ((_) / __| ((_)(_) _|| |_ _(()((_)((_)_  ((_)(_))
                                |  _// _ \| '_|| '_ \)| ' \| || || '_|| || || |(_-< \__ \/ _ \ |  _||  _|\ V  V // _` || '_|/ -_)
                                |_|  \___/|_|  | .__/ |_||_|\_, ||_|  |_| \_,_|/__/ |___/\___/ |_|   \__| \_/\_/ \__,_||_|  \___|
                                |_|          |__/
                            </pre>
                        </foreignObject>

                    </g>
                </g>
            </g>
        </g>
    </g>

</svg>
